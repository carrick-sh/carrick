# ========================= Node.js / libuv (tap) ============================
# Both engines run the image's native nodejs-conformance entrypoint; the
# carrick/docker distinction is carried only by EFFECTIVE_RUNNER. Stage-1 TAP
# parser (coarse pass/fail) per the phased plan.

[[suite]]
name = "node-app-smoke"
ecosystem = "node"
image = "localhost:5005/carrick-nodejs-conformance:24.16.0-26.2.0"
entrypoint = { both = "/usr/local/bin/nodejs-conformance" }
cmd = ["--runner", "docker", "--suite", "app-smoke", "--line", "24", "--timeout", "120"]
verdict = "tap"
tier = "smoke"
weight = "heavy"
timeout_s = 180
carrick_flags = ["--raw", "--fs", "memory"]
env = [{ key = "NODEJS_CONFORMANCE_IN_IMAGE", val = "1" }]
env_carrick = [{ key = "NODEJS_CONFORMANCE_EFFECTIVE_RUNNER", val = "carrick" }]
env_docker = [{ key = "NODEJS_CONFORMANCE_EFFECTIVE_RUNNER", val = "docker" }]

[[suite]]
name = "node-v8-smoke"
ecosystem = "node"
image = "localhost:5005/carrick-nodejs-conformance:24.16.0-26.2.0"
entrypoint = { both = "/usr/local/bin/nodejs-conformance" }
cmd = ["--runner", "docker", "--suite", "v8-smoke", "--line", "24", "--timeout", "120"]
verdict = "tap"
tier = "smoke"
weight = "heavy"
timeout_s = 180
carrick_flags = ["--raw", "--fs", "memory"]
env = [{ key = "NODEJS_CONFORMANCE_IN_IMAGE", val = "1" }]
env_carrick = [{ key = "NODEJS_CONFORMANCE_EFFECTIVE_RUNNER", val = "carrick" }]
env_docker = [{ key = "NODEJS_CONFORMANCE_EFFECTIVE_RUNNER", val = "docker" }]

[[suite]]
name = "node-libuv"
ecosystem = "node"
image = "localhost:5005/carrick-nodejs-conformance:24.16.0-26.2.0"
entrypoint = { both = "/usr/local/bin/nodejs-conformance" }
cmd = ["--runner", "docker", "--suite", "libuv", "--line", "24", "--timeout", "180"]
verdict = "tap"
tier = "full"
weight = "heavy"
timeout_s = 300
carrick_flags = ["--raw", "--fs", "memory"]
docker_flags = ["--user", "65534"]
env = [{ key = "NODEJS_CONFORMANCE_IN_IMAGE", val = "1" }]
env_carrick = [{ key = "NODEJS_CONFORMANCE_EFFECTIVE_RUNNER", val = "carrick" }]
env_docker = [{ key = "NODEJS_CONFORMANCE_EFFECTIVE_RUNNER", val = "docker" }]

