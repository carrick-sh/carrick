# carrick conformance suites — GENERATED by `--generate-suites`
# (crates/carrick-conformance/src/generate.rs). Do NOT edit by hand;
# re-run after a container update. tier=smoke -> fast gate
# (just conformance-quick); tier=full -> 100% coverage.

[[suite]]
name = "go-build"
ecosystem = "go"
image = "localhost:5005/carrick-go-conformance:1.24"
cmd = ["/bin/sh", "-c", '''cd /tmp && printf 'package main\nfunc main(){println("ok")}\n' > h.go && GOCACHE=/tmp/gc /usr/local/go/bin/go build -o /tmp/h ./h.go && /tmp/h && echo BUILD_OK''']
verdict = "shell"
tier = "smoke"
weight = "heavy"
timeout_s = 120
carrick_flags = ["--raw", "--fs", "host"]
workdir = "/tmp"

[[suite]]
name = "node-app-smoke"
ecosystem = "node"
image = "localhost:5005/carrick-nodejs-conformance:24.16.0-26.2.0"
cmd = ["--runner", "docker", "--suite", "app-smoke", "--line", "24", "--timeout", "120"]
verdict = "tap"
tier = "smoke"
weight = "heavy"
timeout_s = 180
carrick_flags = ["--raw", "--fs", "host"]

[suite.entrypoint]
both = "/usr/local/bin/nodejs-conformance"

[[suite]]
name = "node-v8-smoke"
