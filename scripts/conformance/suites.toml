# ============================== Go (gotest) =================================
# Prebaked image driver: the test binary lives at /conformance/<pkg>.test and
# runs with -w at the package's GOROOT src dir (mirrors go-conformance-image.sh).

[[suite]]
name = "go-runtime"
ecosystem = "go"
image = "localhost:5005/carrick-go-conformance:1.24"
cmd = ["/conformance/runtime.test", "-test.run", "Test", "-test.short"]
verdict = "gotest"
tier = "smoke"
weight = "heavy"
timeout_s = 180
workdir = "/usr/local/go/src/runtime"
carrick_flags = ["--raw", "--fs", "memory"]

