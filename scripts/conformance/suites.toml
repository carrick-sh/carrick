# Unified conformance suite manifest — the single declarative source the
# carrick-conformance harness reads. Each [[suite]] runs the SAME image + trailing
# `cmd` under `carrick run` and `docker run` (the Linux oracle); the harness diffs
# the outcome categories. See docs/superpowers/specs/2026-06-03-conformance-harness-design.md.
#
# Invariants enforced by the validator (manifest.rs):
#   - coherent suites pin `--fs memory` in carrick_flags (never the volume default).
#   - images carry a registry host (localhost:5050 / :5005), never a bare daemon tag.
# `tier = "smoke"` is the fast pre-merge gate; `full` adds the rest.

# ============================ CPython (regrtest) ============================
# Image bakes Lib/test (the --bundled form); python3 is the absolute path.

[[suite]]
name = "cpython-smoke"
ecosystem = "cpython"
image = "localhost:5050/cpython-test:3.12.13"
cmd = ["/usr/local/bin/python3", "-m", "test", "-v", "--randseed", "0", "test_subprocess", "test_threading"]
verdict = "regrtest"
tier = "smoke"
weight = "heavy"
timeout_s = 240
carrick_flags = ["--raw", "--fs", "memory"]
known_gaps = [
  "test_subprocess", # cluster-1 nested-fork HVF wedge (deterministic at scale)
]

[[suite]]
name = "cpython-math"
ecosystem = "cpython"
image = "localhost:5050/cpython-test:3.12.13"
cmd = ["/usr/local/bin/python3", "-m", "test", "-v", "--randseed", "0", "test_math"]
verdict = "regrtest"
tier = "full"
weight = "heavy"
timeout_s = 180
carrick_flags = ["--raw", "--fs", "memory"]

[[suite]]
name = "cpython-json"
ecosystem = "cpython"
image = "localhost:5050/cpython-test:3.12.13"
cmd = ["/usr/local/bin/python3", "-m", "test", "-v", "--randseed", "0", "test_json"]
verdict = "regrtest"
tier = "full"
weight = "heavy"
timeout_s = 180
carrick_flags = ["--raw", "--fs", "memory"]

[[suite]]
name = "cpython-glob"
ecosystem = "cpython"
image = "localhost:5050/cpython-test:3.12.13"
cmd = ["/usr/local/bin/python3", "-m", "test", "-v", "--randseed", "0", "test_glob"]
verdict = "regrtest"
tier = "full"
weight = "heavy"
timeout_s = 180
carrick_flags = ["--raw", "--fs", "memory"]
known_gaps = [
  "test_glob", # cluster-3 samestat inode-identity -> shutil.rmtree refuses
]

[[suite]]
name = "cpython-fcntl"
ecosystem = "cpython"
image = "localhost:5050/cpython-test:3.12.13"
cmd = ["/usr/local/bin/python3", "-m", "test", "-v", "--randseed", "0", "test_fcntl"]
verdict = "regrtest"
