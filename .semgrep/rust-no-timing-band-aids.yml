rules:
  - id: rust-no-timing-band-aids
    languages: [rust]
    severity: WARNING
    message: |
      `sleep` used inside a `loop { … sleep … }` pattern that looks like
      timing-as-correctness — i.e., "wait a bit and hope the race resolves"
      rather than waiting on an actual notification (futex / kqueue /
      condvar / pipe). Timing band-aids are flaky under load and silently
      drop events.
      Prefer:
        * `EVFILT_USER` + `kevent` for cross-thread wakeups,
        * `__ulock_*` for guest futex on SHARED pages,
        * a self-pipe `read` blocked on a host signal handler,
        * `parking_lot::Condvar`, `tokio::sync::Notify`,
        * `crate::io_wait::WaitOnFds`/`WaitOnSignals`.
      A sleep is FINE when the literal contract is "wait N seconds"
      (deadline / poll interval over an external system); the smell is a
      `sleep` mid-`loop {}` checking a memory flag.
    patterns:
      - pattern-either:
          # A SHORT-literal sleep inside any loop — the polling smell.
          # An interval/deadline sleep (`sleep(interval)` where interval
          # is a parameter / computed Duration) is NOT flagged: that is
          # the literal contract of e.g. an itimer fallback thread or a
          # periodic posix_timer worker.
          - pattern: |
              loop {
                ...
                std::thread::sleep(Duration::from_millis($N));
                ...
              }
          - pattern: |
              while $COND {
                ...
                std::thread::sleep(Duration::from_millis($N));
                ...
              }
          - pattern: |
              loop {
                ...
                std::thread::sleep(Duration::from_micros($N));
                ...
              }
          - pattern: |
              loop {
                ...
                tokio::time::sleep(Duration::from_millis($N)).await;
                ...
              }
      # Cap the literal at a busy-loop scale (≤ 50 ms). A bigger sleep
      # is more likely a deliberate poll interval against an external
      # system (CI status, deploy queue) than a race-papering hack.
      - metavariable-comparison:
          metavariable: $N
          comparison: int($N) <= 50
    paths:
      include:
        - "/crates/**/*.rs"
      exclude:
        - "**/tests/**"
        - "**/*_test.rs"
        - "**/test_*.rs"
        - "**/conformance-probes/**"  # Probes intentionally use bounded waits
        - "**/runtime.rs"  # The runtime owns the legitimate wait loops
        - "**/io_wait*.rs"  # io_wait is the canonical wait abstraction
