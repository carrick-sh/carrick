name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Compile + lint + host tests. carrick-runtime links Hypervisor.framework, so
  # this must run on macOS/arm64 — but these steps never launch a guest vCPU, so
  # a GitHub-hosted runner (no hypervisor entitlement / no nested virt) is fine.
  check:
    name: fmt · clippy · build · unit tests
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # The gate commands live in the justfile (single source of truth). CI
      # installs `just` and calls the matching recipe per step, so `just ci`
      # locally runs exactly what this job runs — no drift between the two.
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Formatting
        run: just fmt-check

      # No-panic gate: unwrap/expect/panic/todo/unimplemented are denied via
      # crate-level attributes; `-D warnings` promotes every other lint too.
      - name: Clippy (no-panic gate)
        run: just clippy

      - name: Build
        run: just check --workspace

      # Rustdoc gate: broken intra-doc links / unclosed-HTML-tag lints fail the
      # build, mirroring the clippy gate (--document-private-items because
      # carrick is internal — most of its substance lives on private items).
      - name: Docs (rustdoc gate)
        run: just doc

      # `just test` is `--lib` only; the HVF-dependent integration binaries
      # (trap_hvf, runtime_loop, interactive_tty, …) need an entitled vCPU and
      # run in the self-hosted job below. The pure-logic suites run via
      # `just test-integration`.
      #
      # GitHub-hosted macOS runners default RLIMIT_NOFILE to 256, but carrick
      # relocates its internal fds above 16384 to stay clear of the guest fd
      # range — so the test processes need real-host fd headroom. `ulimit`
      # doesn't persist across steps, so each test step raises the kernel cap
      # (sysctl) and the soft limit (ulimit) in its own shell before the recipe.
      - name: Unit tests
        run: |
          sudo sysctl -w kern.maxfiles=524288 kern.maxfilesperproc=524288 || true
          ulimit -n 65536 || ulimit -n "$(ulimit -Hn)" || true
          echo "RLIMIT_NOFILE: soft=$(ulimit -Sn) hard=$(ulimit -Hn)"
          just test

      - name: Host integration tests (no HVF)
        run: |
          sudo sysctl -w kern.maxfiles=524288 kern.maxfilesperproc=524288 || true
          ulimit -n 65536 || ulimit -n "$(ulimit -Hn)" || true
          echo "RLIMIT_NOFILE: soft=$(ulimit -Sn) hard=$(ulimit -Hn)"
          just test-integration

  # Full HVF runtime + differential conformance vs Docker. Requires a self-hosted
  # Apple-Silicon runner that (a) holds the com.apple.security.hypervisor
  # entitlement and (b) has Docker available. GitHub-hosted macOS runners can do
  # neither, so this job is DORMANT until a runner exists: set the repo variable
  # CARRICK_SELF_HOSTED=true (and register a runner with the matching labels) to
  # enable it. Defined now so the pipeline is ready the moment a runner lands.
  hvf-conformance:
    name: HVF runtime · conformance
    if: ${{ vars.CARRICK_SELF_HOSTED == 'true' }}
    runs-on: [self-hosted, macos, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build + codesign
        run: ./scripts/build-signed.sh

      - name: Full test suite (incl. HVF integration)
        run: cargo test --workspace

      # Differential carrick-vs-Docker suite. Self-skips if Docker is unreachable
      # or the signed binary is missing, so it is safe even on a partial runner.
      - name: Conformance (carrick vs Docker)
        run: cargo test -p carrick-cli --test conformance -- --nocapture
